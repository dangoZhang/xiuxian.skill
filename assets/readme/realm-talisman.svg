  <text x="600" y="346" fill="#85512A" font-size="21" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, serif" font-weight="400"><tspan x="600" dy="0">开始把自己的做法封成技法、模板、模块</tspan></text>
  
  <g>
