    <text x="600" y="800" fill="#8A562D" font-size="20" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, serif" letter-spacing="4">命主判词</text>
    <text x="600" y="866" fill="#4C2412" font-size="28" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-weight="700"><tspan x="600" dy="0">此番观气，已至金丹之境，五脉均势 50/100。</tspan><tspan x="600" dy="38">同修合拍 85/100 最盛，收功松散 34/100 为关隘。</tspan><tspan x="600" dy="38">本卷 4 条对话，2 次分身，炼化 2,892 枚灵气。</tspan></text>
