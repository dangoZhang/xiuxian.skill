    <text x="600" y="1182" fill="#4F2812" font-size="28" text-anchor="middle" font-family="STKaiti, KaiTi, serif" font-weight="700"><tspan x="600" dy="0">每一轮收功时，都要求附上验证命令或可观察结</tspan><tspan x="600" dy="38">果。</tspan></text>
    <text x="600" y="1244" fill="#81502A" font-size="18" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, serif">守住一条主线，再启下一轮炼化</text>
